# ═══════════════════════════════════════════════════════
# XmetaV Redis Config — Agent Cache & Session Store
# Loaded on top of default redis.conf
# ═══════════════════════════════════════════════════════

# Persistence — append-only for durability
appendonly yes
appendfilename "xmetav-aof.aof"
appenddirname "xmetav-appendonly"

# Save snapshots every 60s if at least 100 keys changed
save 60 100
save 300 10
save 900 1

# Max memory — 4GB (Mac Studio has 96GB, plenty)
maxmemory 4gb
maxmemory-policy allkeys-lru

# Database naming convention:
# DB 0 = agent session cache
# DB 1 = rate limiting / counters
# DB 2 = queue / pub-sub
# DB 3 = general cache

# Connection limits
maxclients 256
timeout 300

# Logging
loglevel notice
logfile /tmp/xmetav-redis.log

# Disable dangerous commands in production
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command CONFIG "XMETAV_CONFIG"
